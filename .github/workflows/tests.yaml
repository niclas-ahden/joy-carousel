name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

# this cancels workflows currently in progress if you start a new one
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Do not add permissions here! Configure them at the job level!
permissions: {}

jobs:
  build-and-test-nix:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      # `joy` is a git submodule (the Rust web platform the test app builds
      # against) -- the test build fails without it.
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: cachix/install-nix-action@02a151ada4993995686f9ed4f1be7cfbb229e56f # commit for v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: print architecture
        run: uname -m

      # tests.sh builds the test app (Roc -> WASM, Zig link, wasm-pack, server)
      # and runs the Playwright suite. The flake devShell carries roc, zig,
      # wasm-pack and playwright-test; tests.sh already falls back from
      # systemd-run to direct execution when no user systemd session exists.
      - name: Run all tests
        run: nix develop -c ./tests.sh
